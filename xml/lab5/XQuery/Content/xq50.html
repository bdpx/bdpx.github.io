<h3 align=center> Выражение FLOWR </h3>
<p>Главной частью XQuery является выражение FLOWR. Это аббревиатура из первых букв операторов, которые могут входить в это выражение:
<ul>
<li><code>for</code>
<li><code>let</code>
<li><code>order by</code>
<li><code>where</code>
<li><code>return</code>
</ul>
